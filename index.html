<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Identity Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">
  <h1>🔍 Identity Finder</h1>
  <p>Upload emails → Get social + YouTube data</p>

  <div class="upload-box" id="drop-zone">
    <p>Drag & drop CSV here or click to upload</p>
    <input type="file" id="fileInput" hidden />
  </div>

  <button onclick="uploadCSV()">Process File</button>

  <div id="status"></div>

  <a id="downloadLink" style="display:none;" download>
    Download Results
  </a>
</div>

<script src="app.js"></script>
</body>
</html>
