<!DOCTYPE html>
<html>
<head>
  <title>Identity Finder</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      max-width: 500px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    #appPage {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
    }

    #progressBar {
      width: 100%;
      background: #334155;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    #progress {
      width: 0%;
      height: 10px;
      background: #22c55e;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN PAGE -->
<div id="loginPage" class="card">
  <h2>Login</h2>
  <input id="username" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 🚀 APP PAGE -->
<div id="appPage">

  <h1>🔍 Identity Finder</h1>

  <div class="card">
    <button onclick="logout()">Logout</button>
    <button onclick="startCheckout()">Upgrade 🚀</button>
  </div>

  <div class="card">
    <h3>Upload CSV</h3>

    <div id="drop-zone">Click or drag CSV file here</div>
    <input type="file" id="fileInput" hidden />

    <button onclick="uploadCSV()">Process</button>

    <div id="progressBar">
      <div id="progress"></div>
    </div>

    <p id="status"></p>
  </div>

  <div class="card">
    <h3>Results</h3>

    <table id="resultsTable">
      <thead>
        <tr>
          <th>Email</th>
          <th>Company</th>
          <th>LinkedIn</th>
          <th>Twitter</th>
          <th>Instagram</th>
          <th>Facebook</th>
          <th>YouTube</th>
          <th>Subscribers</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <br>
    <a id="downloadLink" style="display:none;">Download CSV</a>
  </div>

</div>

<script type="module" src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
