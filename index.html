<!DOCTYPE html>
<html>
<head>
  <title>Identity Finder</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
    }

    button {
      background: #22c55e;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      color: white;
      margin-left: 10px;
    }

    button:hover {
      background: #16a34a;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
    }

    #drop-zone {
      border: 2px dashed #475569;
      padding: 30px;
      text-align: center;
      margin: 15px 0;
      cursor: pointer;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #334155;
      font-size: 14px;
    }

    th {
      background: #334155;
    }

    #progressBar {
      width: 100%;
      background: #334155;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 10px;
    }

    #progress {
      width: 0%;
      height: 10px;
      background: #22c55e;
    }

    #loginPage {
      max-width: 400px;
      margin: 120px auto;
    }

    a {
      color: #22c55e;
    }
  </style>
</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginPage" class="card">
  <h2>Login</h2>
  <input id="username" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- 🚀 APP -->
<div id="appPage" style="display:none;">
  <div class="container">

    <!-- HEADER -->
    <div class="header">
      <h1>🔍 Identity Finder</h1>
      <div>
        <button onclick="startCheckout()">Upgrade 🚀</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <!-- UPLOAD -->
    <div class="card">
      <h3>Upload CSV</h3>

      <div id="drop-zone">Click or drag CSV file here</div>
      <input type="file" id="fileInput" hidden />

      <button onclick="uploadCSV()">Process</button>

      <div id="progressBar">
        <div id="progress"></div>
      </div>

      <p id="status"></p>
    </div>

    <!-- RESULTS -->
    <div class="card">
      <h3>Results</h3>

      <table id="resultsTable">
        <thead>
          <tr>
            <th>Email</th>
            <th>Company</th>
            <th>LinkedIn</th>
            <th>Twitter</th>
            <th>Instagram</th>
            <th>Facebook</th>
            <th>YouTube</th>
            <th>Subscribers</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>

      <br>
      <a id="downloadLink" style="display:none;">Download CSV</a>
    </div>

  </div>
</div>

<script type="module" src="auth.js"></script>
<script src="app.js"></script>

</body>
</html>
